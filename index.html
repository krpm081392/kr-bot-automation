
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KR Robot</title>

<style>
body{
margin:0;
overflow:hidden;
background:#050816;
font-family:Arial;
}

#text{
position:absolute;
top:20px;
left:20px;
color:white;
z-index:10;
background:rgba(0,0,0,0.5);
padding:15px;
border-radius:12px;
border:1px solid cyan;
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

</head>

<body>

<div id="text">
<h2>KR Robot Loaded</h2>
<p>If robot appears, it works.</p>
</div>

<script type="module">

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050816);

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,2,8);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

const light = new THREE.HemisphereLight(0xffffff,0x444444,3);
scene.add(light);

const floor = new THREE.Mesh(
new THREE.PlaneGeometry(100,100),
new THREE.MeshStandardMaterial({color:0x111827})
);

floor.rotation.x = -Math.PI/2;
floor.position.y = -2;
scene.add(floor);

let robot;

const loader = new GLTFLoader();

loader.load(
'./robot.glb',

(gltf)=>{

robot = gltf.scene;

robot.scale.set(2,2,2);

robot.position.set(0,-2,0);

scene.add(robot);

console.log("robot loaded");

},

undefined,

(error)=>{

console.error(error);

alert("Robot failed. Use localhost server.");

}

);

function animate(){

requestAnimationFrame(animate);

if(robot){

robot.rotation.y += 0.005;

robot.position.x = Math.sin(Date.now()*0.001) * 2;

}

controls.update();

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
